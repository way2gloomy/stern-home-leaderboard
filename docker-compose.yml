services:
  frontend:
    container_name: frontend
    build:
      context: ./frontend
      dockerfile: Dockerfile
    image: stern-home-leaderboard-frontend:local
    ports:
      - "${FRONTEND_PORT:-3000}:80"
    environment:
      - DATA_REFRESH_INTERVAL_MINUTES=${DATA_REFRESH_INTERVAL_MINUTES:-60}
      - GRID_COLUMNS=${GRID_COLUMNS:-${VITE_GRID_COLUMNS:-1}}
      - DISABLE_AUTOSCROLL=${DISABLE_AUTOSCROLL:-false}
      - CUSTOM_CSS_PATH=${CUSTOM_CSS_PATH}
    volumes:
      # Optional: Mount your custom assets into the /app/data directory.
      # They will be linked to the web server static directory if present.
      # `custom.css` specifically will be injected if present.
      # Update the path on the left to your custom location
      - ./frontend/public/app/data:/app/data:ro
    depends_on:
      - backend
  backend:
    container_name: backend
    build:
      context: ./backend
      dockerfile: Dockerfile
    image: stern-home-leaderboard-backend:local
    expose:
      - "5100"
    environment:
      - STERN_USERNAME=${STERN_USERNAME:-}
      - STERN_PASSWORD=${STERN_PASSWORD:-}
      - STERN_USERNAME_FILE=${STERN_USERNAME_FILE:-}
      - STERN_PASSWORD_FILE=${STERN_PASSWORD_FILE:-}
      - SESSION_SECRET=${SESSION_SECRET:-}
      - CORS_ALLOWED_ORIGINS=${CORS_ALLOWED_ORIGINS:-http://localhost:3000,http://127.0.0.1:3000}
      - DEFAULT_COUNTRY=${DEFAULT_COUNTRY}
      - DEFAULT_STATE=${DEFAULT_STATE}
      - DEFAULT_STATE_NAME=${DEFAULT_STATE_NAME}
      - DEFAULT_CONTINENT=${DEFAULT_CONTINENT}
